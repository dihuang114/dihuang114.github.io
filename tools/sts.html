<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>杀戮尖塔 - 随机卡牌</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #0a0a0f;
    background-image:
      radial-gradient(ellipse at 50% 0%, rgba(120, 40, 40, 0.2) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(40, 40, 120, 0.15) 0%, transparent 50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: "Noto Serif SC", "Source Han Serif SC", "SimSun", "STSong", "Microsoft YaHei", serif;
    color: #d4c8a0;
    overflow-x: hidden;
    user-select: none;
    padding: 2rem 1rem;
  }

  .title {
    font-size: 2.2rem;
    letter-spacing: 0.3em;
    color: #c9a84c;
    text-shadow: 0 0 20px rgba(200, 160, 60, 0.5);
    margin-bottom: 2rem;
    text-align: center;
  }

  /* ===== 图例 ===== */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem 1.2rem;
    justify-content: center;
    margin-bottom: 2.5rem;
    font-size: 0.8rem;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    letter-spacing: 0.05em;
  }
  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 3px;
    flex-shrink: 0;
  }
  .legend-dot.ironclad  { background: #d94444; box-shadow: 0 0 8px rgba(217,68,68,0.5); }
  .legend-dot.silent    { background: #3db85c; box-shadow: 0 0 8px rgba(61,184,92,0.5); }
  .legend-dot.defect    { background: #4499dd; box-shadow: 0 0 8px rgba(68,153,221,0.5); }
  .legend-dot.watcher   { background: #a54fda; box-shadow: 0 0 8px rgba(165,79,218,0.5); }
  .legend-dot.colorless { background: #c8c8c8; box-shadow: 0 0 8px rgba(200,200,200,0.4); }
  .legend-dot.status    { background: #777;    box-shadow: 0 0 6px rgba(120,120,120,0.4); }
  .legend-dot.curse     { background: #3a3a3a; box-shadow: 0 0 6px rgba(40,40,40,0.4); }

  /* ===== 卡牌容器 ===== */
  .cards-container {
    display: flex;
    gap: 2rem;
    flex-wrap: wrap;
    justify-content: center;
    min-height: 380px;
    align-items: center;
  }

  .card-slot {
    width: 220px;
    height: 340px;
    position: relative;
    perspective: 800px;
  }

  /* ===== 占位符 ===== */
  .card-placeholder {
    width: 220px;
    height: 340px;
    border: 2px dashed rgba(200, 160, 60, 0.2);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3.5rem;
    color: rgba(200, 160, 60, 0.15);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { border-color: rgba(200, 160, 60, 0.12); }
    50% { border-color: rgba(200, 160, 60, 0.3); }
  }

  /* ===== 卡牌本体 ===== */
  .card {
    width: 220px;
    height: 340px;
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    /* 默认色 (会被class覆盖) */
    background: linear-gradient(160deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
    border: 2px solid #888;
    box-shadow: 0 0 20px rgba(0,0,0,0.4), inset 0 0 50px rgba(0,0,0,0.5);
  }

  /* 内边框装饰 */
  .card::before {
    content: '';
    position: absolute;
    inset: 7px;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 9px;
    pointer-events: none;
    z-index: 2;
  }

  /* 顶部光泽 */
  .card::after {
    content: '';
    position: absolute;
    top: -60%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at center, rgba(255,255,255,0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 1;
  }

  /* ---- 战士 (铁甲战士) - 红色 ---- */
  .card.ironclad {
    background: linear-gradient(160deg, #2a1518 0%, #1f1218 35%, #1a1018 100%);
    border-color: #d94444;
    box-shadow: 0 0 24px rgba(217,68,68,0.25), 0 0 60px rgba(200,50,50,0.08), inset 0 0 50px rgba(0,0,0,0.55);
  }
  .card.ironclad .card-name {
    color: #f0c8c0;
    text-shadow: 0 0 12px rgba(230,120,100,0.5);
  }
  .card.ironclad .card-class-label {
    color: #e07070;
    background: rgba(200,60,60,0.15);
    border-color: rgba(217,68,68,0.3);
  }
  .card.ironclad .card-desc {
    color: #c8a0a0;
  }
  .card.ironclad .card-divider {
    background: linear-gradient(90deg, transparent, rgba(217,68,68,0.4), transparent);
  }

  /* ---- 静默猎手 - 绿色 ---- */
  .card.silent {
    background: linear-gradient(160deg, #152a18 0%, #121f16 35%, #101a14 100%);
    border-color: #3db85c;
    box-shadow: 0 0 24px rgba(61,184,92,0.25), 0 0 60px rgba(50,180,80,0.08), inset 0 0 50px rgba(0,0,0,0.55);
  }
  .card.silent .card-name {
    color: #c0f0c8;
    text-shadow: 0 0 12px rgba(80,210,110,0.5);
  }
  .card.silent .card-class-label {
    color: #60c878;
    background: rgba(50,170,80,0.15);
    border-color: rgba(61,184,92,0.3);
  }
  .card.silent .card-desc {
    color: #a0c8a8;
  }
  .card.silent .card-divider {
    background: linear-gradient(90deg, transparent, rgba(61,184,92,0.4), transparent);
  }

  /* ---- 故障机器人 - 蓝色 ---- */
  .card.defect {
    background: linear-gradient(160deg, #151a2a 0%, #121820 35%, #101620 100%);
    border-color: #4499dd;
    box-shadow: 0 0 24px rgba(68,153,221,0.25), 0 0 60px rgba(60,140,210,0.08), inset 0 0 50px rgba(0,0,0,0.55);
  }
  .card.defect .card-name {
    color: #c0d8f0;
    text-shadow: 0 0 12px rgba(80,160,230,0.5);
  }
  .card.defect .card-class-label {
    color: #68a8e0;
    background: rgba(50,130,200,0.15);
    border-color: rgba(68,153,221,0.3);
  }
  .card.defect .card-desc {
    color: #a0b8d0;
  }
  .card.defect .card-divider {
    background: linear-gradient(90deg, transparent, rgba(68,153,221,0.4), transparent);
  }

  /* ---- 观者 - 紫色 ---- */
  .card.watcher {
    background: linear-gradient(160deg, #20182a 0%, #1a1422 35%, #16101e 100%);
    border-color: #a54fda;
    box-shadow: 0 0 24px rgba(165,79,218,0.25), 0 0 60px rgba(150,70,200,0.08), inset 0 0 50px rgba(0,0,0,0.55);
  }
  .card.watcher .card-name {
    color: #e0c8f0;
    text-shadow: 0 0 12px rgba(160,100,230,0.5);
  }
  .card.watcher .card-class-label {
    color: #b878e0;
    background: rgba(140,60,200,0.15);
    border-color: rgba(165,79,218,0.3);
  }
  .card.watcher .card-desc {
    color: #c0a8d8;
  }
  .card.watcher .card-divider {
    background: linear-gradient(90deg, transparent, rgba(165,79,218,0.4), transparent);
  }

  /* ---- 无色牌 - 银白 ---- */
  .card.colorless {
    background: linear-gradient(160deg, #202020 0%, #1c1c1e 35%, #18181c 100%);
    border-color: #b0b0b0;
    box-shadow: 0 0 24px rgba(180,180,180,0.2), 0 0 60px rgba(160,160,160,0.06), inset 0 0 50px rgba(0,0,0,0.55);
  }
  .card.colorless .card-name {
    color: #e8e8e8;
    text-shadow: 0 0 12px rgba(200,200,200,0.4);
  }
  .card.colorless .card-class-label {
    color: #b0b0b0;
    background: rgba(180,180,180,0.12);
    border-color: rgba(180,180,180,0.25);
  }
  .card.colorless .card-desc {
    color: #b0b0b0;
  }
  .card.colorless .card-divider {
    background: linear-gradient(90deg, transparent, rgba(180,180,180,0.35), transparent);
  }

  /* ---- 状态牌 - 灰色 ---- */
  .card.status {
    background: linear-gradient(160deg, #1a1a1a 0%, #161616 35%, #121212 100%);
    border-color: #777;
    box-shadow: 0 0 16px rgba(100,100,100,0.2), inset 0 0 40px rgba(0,0,0,0.5);
  }
  .card.status .card-name {
    color: #aaa;
    text-shadow: none;
  }
  .card.status .card-class-label {
    color: #888;
    background: rgba(120,120,120,0.12);
    border-color: rgba(120,120,120,0.25);
  }
  .card.status .card-desc {
    color: #808080;
  }
  .card.status .card-divider {
    background: linear-gradient(90deg, transparent, rgba(120,120,120,0.3), transparent);
  }

  /* ---- 诅咒牌 - 黑色 ---- */
  .card.curse {
    background: linear-gradient(160deg, #0e0e0e 0%, #0a0a0a 35%, #080808 100%);
    border-color: #3a3a3a;
    box-shadow: 0 0 10px rgba(0,0,0,0.6), inset 0 0 30px rgba(0,0,0,0.6);
  }
  .card.curse .card-name {
    color: #705050;
    text-shadow: 0 0 6px rgba(120,40,40,0.3);
  }
  .card.curse .card-class-label {
    color: #604040;
    background: rgba(80,30,30,0.15);
    border-color: rgba(80,40,40,0.25);
  }
  .card.curse .card-desc {
    color: #604040;
  }
  .card.curse .card-divider {
    background: linear-gradient(90deg, transparent, rgba(80,50,50,0.3), transparent);
  }

  /* ---- 卡牌内部布局 ---- */
  .card-class-label {
    position: absolute;
    top: 12px;
    left: 14px;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    padding: 3px 10px;
    border-radius: 3px;
    border: 1px solid;
    z-index: 3;
  }

  .card-name {
    font-size: 1.55rem;
    letter-spacing: 0.12em;
    z-index: 3;
    margin-top: 0.3rem;
    transition: all 0.3s ease;
  }

  /* 锻造 + 号 */
  .forge-plus {
    display: inline-block;
    color: #ffd700;
    font-size: 1.3rem;
    font-weight: bold;
    margin-left: 2px;
    text-shadow: 0 0 14px rgba(255,215,0,0.8), 0 0 28px rgba(255,200,0,0.5);
    animation: forgeGlow 0.8s ease-in-out infinite alternate;
    position: relative;
    top: -2px;
  }
  @keyframes forgeGlow {
    0%   { text-shadow: 0 0 10px rgba(255,215,0,0.6), 0 0 20px rgba(255,200,0,0.3); }
    100% { text-shadow: 0 0 18px rgba(255,215,0,1), 0 0 36px rgba(255,200,0,0.7); }
  }

  /* 锻造后卡牌边框更亮 */
  .card.forged {
    border-width: 2.5px;
  }
  .card.forged.ironclad  { border-color: #f06060; box-shadow: 0 0 30px rgba(240,80,80,0.35), 0 0 60px rgba(200,50,50,0.12), inset 0 0 50px rgba(0,0,0,0.55); }
  .card.forged.silent    { border-color: #50d870; box-shadow: 0 0 30px rgba(80,210,100,0.35), 0 0 60px rgba(50,180,80,0.12), inset 0 0 50px rgba(0,0,0,0.55); }
  .card.forged.defect    { border-color: #5cb0f0; box-shadow: 0 0 30px rgba(90,170,240,0.35), 0 0 60px rgba(60,140,210,0.12), inset 0 0 50px rgba(0,0,0,0.55); }
  .card.forged.watcher   { border-color: #c070f0; box-shadow: 0 0 30px rgba(190,100,240,0.35), 0 0 60px rgba(150,70,200,0.12), inset 0 0 50px rgba(0,0,0,0.55); }
  .card.forged.colorless { border-color: #ddd;    box-shadow: 0 0 30px rgba(210,210,210,0.3), 0 0 60px rgba(180,180,180,0.1), inset 0 0 50px rgba(0,0,0,0.55); }
  .card.forged.status    { border-color: #999;    box-shadow: 0 0 20px rgba(140,140,140,0.25), inset 0 0 40px rgba(0,0,0,0.5); }
  .card.forged.curse     { border-color: #5a4040; box-shadow: 0 0 14px rgba(100,40,40,0.3), inset 0 0 30px rgba(0,0,0,0.6); }

  .card-divider {
    width: 60%;
    height: 1px;
    margin: 14px 0;
    z-index: 3;
    opacity: 0.7;
  }

  .card-desc {
    font-size: 0.8rem;
    letter-spacing: 0.06em;
    z-index: 3;
    text-align: center;
    padding: 0 20px;
    line-height: 1.6;
    min-height: 2.6em;
    display: flex;
    align-items: center;
    opacity: 0.75;
    transition: all 0.3s ease;
  }

  /* ===== 卡牌揭示动画 ===== */
  .card.reveal {
    animation: cardReveal 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }

  @keyframes cardReveal {
    0%   { opacity: 0; transform: translateY(50px) scale(0.75) rotateY(100deg); }
    50%  { opacity: 1; transform: translateY(-8px) scale(1.06) rotateY(-12deg); }
    100% { opacity: 1; transform: translateY(0) scale(1) rotateY(0deg); }
  }

  /* ===== 按钮 ===== */
  .btn {
    margin-top: 2.5rem;
    padding: 14px 48px;
    font-size: 1.1rem;
    letter-spacing: 0.2em;
    font-family: inherit;
    color: #0a0a0f;
    background: linear-gradient(135deg, #c9a84c, #e2c86e);
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 20px rgba(200, 160, 60, 0.3);
    z-index: 10;
    position: relative;
  }

  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 28px rgba(200, 160, 60, 0.5);
  }
  .btn:active { transform: translateY(0); }
  .btn:disabled {
    opacity: 0.45;
    cursor: not-allowed;
    transform: none;
    box-shadow: 0 2px 8px rgba(200, 160, 60, 0.15);
  }

  /* ===== 计数器 & 历史 ===== */
  .counter {
    margin-top: 1.2rem;
    font-size: 0.85rem;
    color: rgba(200, 160, 60, 0.45);
    letter-spacing: 0.1em;
  }

  .result-history {
    margin-top: 1.5rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem 1.5rem;
    justify-content: center;
    max-width: 650px;
  }
  .result-history span {
    font-size: 0.8rem;
    color: rgba(200, 160, 60, 0.35);
    letter-spacing: 0.05em;
    animation: fadeIn 0.5s ease-out;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ===== 粒子 ===== */
  .particles {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
  }
  .particle {
    position: absolute;
    border-radius: 50%;
    animation: floatUp 3s ease-out forwards;
    opacity: 0;
  }
  @keyframes floatUp {
    0%   { opacity: 0.9; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-220px) scale(0); }
  }

  /* ===== 数字查牌 ===== */
  .seed-section {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    margin-bottom: 1.6rem;
    flex-wrap: wrap;
    justify-content: center;
  }
  .seed-input {
    width: 260px;
    padding: 9px 14px;
    font-size: 1rem;
    font-family: inherit;
    letter-spacing: 0.1em;
    color: #f0e6c8;
    background: rgba(20, 20, 30, 0.7);
    border: 1px solid rgba(200, 160, 60, 0.35);
    border-radius: 4px;
    text-align: center;
    outline: none;
    transition: border-color 0.3s;
  }
  .seed-input:focus {
    border-color: rgba(200, 160, 60, 0.7);
    box-shadow: 0 0 12px rgba(200, 160, 60, 0.15);
  }
  .seed-input::placeholder {
    color: rgba(200, 160, 60, 0.3);
    letter-spacing: 0.05em;
  }
  .seed-btn {
    padding: 9px 22px;
    font-size: 0.9rem;
    letter-spacing: 0.15em;
    font-family: inherit;
    color: #0a0a0f;
    background: linear-gradient(135deg, #c9a84c, #e2c86e);
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.3s ease;
  }
  .seed-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(200,160,60,0.4); }
  .seed-hint {
    font-size: 0.75rem;
    color: rgba(200, 160, 60, 0.4);
    letter-spacing: 0.08em;
    white-space: nowrap;
  }
  .seed-error {
    width: 100%;
    text-align: center;
    font-size: 0.75rem;
    color: #e06050;
    margin-top: 0.2rem;
    min-height: 1.2em;
    letter-spacing: 0.05em;
  }

  /* ===== 手机端适配 ===== */
  @media (max-width: 600px) {
    body {
      padding: 0.6rem 0.4rem;
      justify-content: flex-start;
    }

    .title {
      font-size: 1.3rem;
      letter-spacing: 0.2em;
      margin-bottom: 0.5rem;
      text-shadow: 0 0 12px rgba(200, 160, 60, 0.4);
    }

    .legend {
      gap: 0.25rem 0.6rem;
      margin-bottom: 0.6rem;
      font-size: 0.6rem;
    }
    .legend-dot {
      width: 9px; height: 9px;
    }

    .cards-container {
      gap: 6px;
      min-height: auto;
      flex-wrap: nowrap;
    }

    .card-slot {
      width: 108px;
      height: 168px;
      perspective: 500px;
    }

    .card-placeholder {
      width: 108px;
      height: 168px;
      border-radius: 10px;
      font-size: 2.2rem;
      border-width: 1.5px;
    }

    .card {
      width: 108px;
      height: 168px;
      border-radius: 10px;
      border-width: 1.5px;
      box-shadow: 0 0 12px rgba(0,0,0,0.4), inset 0 0 30px rgba(0,0,0,0.5);
    }
    .card::before {
      inset: 4px;
      border-radius: 7px;
    }
    .card.forged { border-width: 2px; }

    .card-class-label {
      top: 6px;
      left: 7px;
      font-size: 0.48rem;
      padding: 2px 6px;
      letter-spacing: 0.06em;
    }

    .card-name {
      font-size: 0.9rem;
      letter-spacing: 0.06em;
      margin-top: 0.15rem;
    }

    .forge-plus {
      font-size: 0.8rem;
      margin-left: 1px;
      top: -1px;
    }

    .card-divider {
      margin: 8px 0;
      width: 55%;
    }

    .card-desc {
      font-size: 0.5rem;
      padding: 0 8px;
      min-height: 1.8em;
    }

    .btn {
      margin-top: 1rem;
      padding: 10px 32px;
      font-size: 0.85rem;
      letter-spacing: 0.15em;
    }

    .counter {
      margin-top: 0.5rem;
      font-size: 0.7rem;
    }

    .result-history {
      margin-top: 0.5rem;
      gap: 0.2rem 0.8rem;
    }
    .result-history span {
      font-size: 0.65rem;
    }

    .seed-section { gap: 0.4rem; margin-bottom: 0.6rem; }
    .seed-input { width: 200px; padding: 6px 10px; font-size: 0.78rem; }
    .seed-btn { padding: 6px 14px; font-size: 0.75rem; }
    .seed-hint { font-size: 0.6rem; }
  }
</style>
</head>
<body>

<div class="particles" id="particles"></div>

<h1 class="title">杀 戮 尖 塔</h1>

<!-- 颜色图例 -->
<div class="legend">
  <div class="legend-item"><span class="legend-dot ironclad"></span>战士</div>
  <div class="legend-item"><span class="legend-dot silent"></span>猎手</div>
  <div class="legend-item"><span class="legend-dot defect"></span>机器人</div>
  <div class="legend-item"><span class="legend-dot watcher"></span>观者</div>
  <div class="legend-item"><span class="legend-dot colorless"></span>无色</div>
  <div class="legend-item"><span class="legend-dot status"></span>状态</div>
  <div class="legend-item"><span class="legend-dot curse"></span>诅咒</div>
</div>

<div class="seed-section">
  <input type="text" class="seed-input" id="seedInput" placeholder="输入 3 个数字，空格分隔" maxlength="20" onkeydown="if(event.key==='Enter')lookupCards()">
  <button class="seed-btn" onclick="lookupCards()">查 找</button>
  <span class="seed-hint" id="seedHint"></span>
  <div class="seed-error" id="seedError"></div>
</div>

<div class="cards-container" id="cardsContainer">
  <div class="card-slot"><div class="card-placeholder" id="slot1">?</div></div>
  <div class="card-slot"><div class="card-placeholder" id="slot2">?</div></div>
  <div class="card-slot"><div class="card-placeholder" id="slot3">?</div></div>
</div>

<button class="btn" id="drawBtn" onclick="drawCards()">抽 取 卡 牌</button>
<div class="counter" id="counter"></div>
<div class="result-history" id="history"></div>

  { name:'炸弹',     cls:'colorless', desc:'' },
  { name:'深谋远虑', cls:'colorless', desc:'' },
  { name:'转化',     cls:'colorless', desc:'' },
  { name:'暴力',     cls:'colorless', desc:'' },
  { name:'结茧',     cls:'colorless', desc:'' },
  // -- 特殊技能 --
  { name:'灵体',     cls:'colorless', desc:'' },
  { name:'洞见',     cls:'colorless', desc:'' },
  { name:'J.A.X.',   cls:'colorless', desc:'' },
  { name:'奇迹',     cls:'colorless', desc:'' },
  { name:'平安',     cls:'colorless', desc:'' },
  { name:'贝塔',     cls:'colorless', desc:'' },
  // -- 稀有能力 --
  { name:'磁力',     cls:'colorless', desc:'' },
  { name:'乱战',     cls:'colorless', desc:'' },
  { name:'神气制胜', cls:'colorless', desc:'' },
  { name:'残虐天性', cls:'colorless', desc:'' },

  // ======================== 状态牌 ========================
  { name:'黏液',     cls:'status', desc:'' },
  { name:'虚空',     cls:'status', desc:'' },
  { name:'灼伤',     cls:'status', desc:'' },
  { name:'晕眩',     cls:'status', desc:'' },

  // ======================== 诅咒牌 ========================
  { name:'疑虑',         cls:'curse', desc:'' },
  { name:'受伤',         cls:'curse', desc:'' },
  { name:'死灵诅咒',     cls:'curse', desc:'' },
  { name:'凡庸',         cls:'curse', desc:'' },
  { name:'疼痛',         cls:'curse', desc:'' },
  { name:'寄生',         cls:'curse', desc:'' },
  { name:'傲慢',         cls:'curse', desc:'' },
  { name:'悔恨',         cls:'curse', desc:'' },
  { name:'羞耻',         cls:'curse', desc:'' },
  { name:'苦恼',         cls:'curse', desc:'' },
  { name:'笨拙',         cls:'curse', desc:'' },
  { name:'铃铛的诅咒',   cls:'curse', desc:'' },
  { name:'腐朽',         cls:'curse', desc:'' },
  { name:'进阶之灾',     cls:'curse', desc:'' }
];

// ===== 去重 (同名卡在不同职业出现, 取先定义的) =====
const seen = new Set();
const uniqueCards = cardDatabase.filter(c => {
  if (seen.has(c.name)) return false;
  seen.add(c.name);
  return true;
});

// ===== 打乱一次，建立数字→卡牌映射 =====
const numberedCards = shuffleArray(uniqueCards);
// 显示范围
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('seedHint').textContent = '范围: 1 - ' + numberedCards.length;
});

// ===== 状态 =====
let drawCount = 0;
let isDrawing = false;

// ===== 工具函数 =====
function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function spawnParticles(slotEl, color) {
  const rect = slotEl.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const container = document.getElementById('particles');

  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = (cx + (Math.random() - 0.5) * 180) + 'px';
    p.style.top  = (cy + (Math.random() - 0.5) * 100) + 'px';
    p.style.animationDelay = Math.random() * 0.6 + 's';
    p.style.animationDuration = (2 + Math.random() * 2.5) + 's';
    p.style.width  = (2 + Math.random() * 4) + 'px';
    p.style.height = p.style.width;
    p.style.background = color;
    p.style.boxShadow = '0 0 6px ' + color;
    container.appendChild(p);
    setTimeout(() => p.remove(), 4000);
  }
}

// ===== 主抽牌逻辑 =====
function drawCards() {
  if (isDrawing) return;
  isDrawing = true;
  const btn = document.getElementById('drawBtn');
  btn.disabled = true;
  btn.textContent = '抽 取 中 ...';

  // 清空
  for (let i = 1; i <= 3; i++) {
    const slot = document.getElementById('slot' + i);
    slot.innerHTML = '?';
    slot.className = 'card-placeholder';
  }

  // 随机3张不重复
  const shuffled = shuffleArray(uniqueCards);
  const picked = shuffled.slice(0, 3);

  // 逐张展示 间隔1秒
  picked.forEach((card, index) => {
    // 随机决定是否锻造 (状态牌和诅咒牌不锻造)
    const isForged = (card.cls !== 'status' && card.cls !== 'curse') && Math.random() < 0.15;
    card._forged = isForged;

    setTimeout(() => {
      const slotId = 'slot' + (index + 1);
      const slot = document.getElementById(slotId);

      // 构建卡牌HTML
      const forgedClass = isForged ? ' forged' : '';
      const forgedMark = isForged ? '<span class="forge-plus">+</span>' : '';
      slot.className = 'card reveal ' + card.cls + forgedClass;
      slot.innerHTML = `
        <span class="card-class-label">${getClassLabel(card.cls)}</span>
        <span class="card-name">${card.name}${forgedMark}</span>
        <div class="card-divider"></div>
        <span class="card-desc">${card.desc}</span>
      `;

      // 粒子颜色: 锻造的用金色粒子
      spawnParticles(slot, isForged ? '#ffd700' : getClassColor(card.cls));

      // 全部展示完毕
      if (index === 2) {
        drawCount++;
        document.getElementById('counter').textContent = '已抽取 ' + drawCount + ' 次';
        btn.disabled = false;
        btn.textContent = '再 抽 一 次';
        isDrawing = false;

        // 历史记录 (锻造卡牌名后带+)
        const history = document.getElementById('history');
        const span = document.createElement('span');
        span.textContent = '#' + drawCount + '  ' + picked.map(c => c.name + (c._forged ? '+' : '')).join(' · ');
        history.prepend(span);
        if (history.children.length > 10) {
          history.removeChild(history.lastChild);
        }
      }
    }, 1000 * (index + 1));
  });
}

// ===== 数字查牌 =====
function lookupCards() {
  if (isDrawing) return;
  const input = document.getElementById('seedInput').value.trim();
  const errEl = document.getElementById('seedError');
  errEl.textContent = '';

  if (!input) { errEl.textContent = '请输入数字'; return; }

  const parts = input.split(/\s+/);
  if (parts.length !== 3) { errEl.textContent = '请输入3个数字,空格分隔'; return; }

  const nums = [];
  for (const p of parts) {
    const n = parseInt(p, 10);
    if (isNaN(n) || n < 1 || n > numberedCards.length) {
      errEl.textContent = '数字需在 1 - ' + numberedCards.length + ' 之间，当前: ' + p;
      return;
    }
    nums.push(n);
  }

  isDrawing = true;
  const btn = document.getElementById('drawBtn');
  btn.disabled = true;
  btn.textContent = '查 找 中 ...';

  // 清空
  for (let i = 1; i <= 3; i++) {
    const slot = document.getElementById('slot' + i);
    slot.innerHTML = '?';
    slot.className = 'card-placeholder';
  }

  const picked = nums.map(n => numberedCards[n - 1]);

  // 逐张展示
  picked.forEach((card, index) => {
    const isForged = (card.cls !== 'status' && card.cls !== 'curse') && Math.random() < 0.15;
    card._forged = isForged;

    setTimeout(() => {
      const slot = document.getElementById('slot' + (index + 1));
      const forgedClass = isForged ? ' forged' : '';
      const forgedMark = isForged ? '<span class="forge-plus">+</span>' : '';
      slot.className = 'card reveal ' + card.cls + forgedClass;
      slot.innerHTML = `
        <span class="card-class-label">${getClassLabel(card.cls)}</span>
        <span class="card-name">${card.name}${forgedMark}</span>
        <div class="card-divider"></div>
        <span class="card-desc">${card.desc}</span>
      `;
      spawnParticles(slot, isForged ? '#ffd700' : getClassColor(card.cls));

      if (index === 2) {
        drawCount++;
        document.getElementById('counter').textContent = '已抽取 ' + drawCount + ' 次';
        btn.disabled = false;
        btn.textContent = '再 抽 一 次';
        isDrawing = false;

        const history = document.getElementById('history');
        const span = document.createElement('span');
        span.textContent = '#' + drawCount + '  [' + nums.join(' ') + '] ' + picked.map(c => c.name + (c._forged ? '+' : '')).join(' · ');
        history.prepend(span);
        if (history.children.length > 10) history.removeChild(history.lastChild);
      }
    }, 1000 * (index + 1));
  });
}

function getClassLabel(cls) {
  const map = {
    ironclad:'战士', silent:'猎手', defect:'机器人',
    watcher:'观者', colorless:'无色', status:'状态', curse:'诅咒'
  };
  return map[cls] || '';
}

function getClassColor(cls) {
  const map = {
    ironclad:'#d94444', silent:'#3db85c', defect:'#4499dd',
    watcher:'#a54fda', colorless:'#c8c8c8', status:'#777', curse:'#4a3030'
  };
  return map[cls] || '#c9a84c';
}
