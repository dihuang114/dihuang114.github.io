<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>游乐场</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #0a0a0f;
    background-image:
      radial-gradient(ellipse at 30% 20%, rgba(120, 40, 40, 0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 70% 80%, rgba(40, 40, 120, 0.12) 0%, transparent 50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: "Noto Serif SC", "Source Han Serif SC", "SimSun", "STSong", "Microsoft YaHei", serif;
    color: #d4c8a0;
    user-select: none;
    padding: 2rem 1rem;
  }

  h1 {
    font-size: 2rem;
    letter-spacing: 0.3em;
    color: #c9a84c;
    text-shadow: 0 0 20px rgba(200, 160, 60, 0.4);
    margin-bottom: 3rem;
  }

  .nav-list {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
    max-width: 420px;
    width: 100%;
  }

  .nav-card {
    display: flex;
    align-items: center;
    gap: 1.2rem;
    padding: 1.4rem 1.6rem;
    background: linear-gradient(135deg, rgba(25, 25, 40, 0.8), rgba(20, 20, 35, 0.9));
    border: 1px solid rgba(200, 160, 60, 0.2);
    border-radius: 10px;
    text-decoration: none;
    color: #d4c8a0;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .nav-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at left, rgba(200, 160, 60, 0.06) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .nav-card:hover {
    border-color: rgba(200, 160, 60, 0.5);
    transform: translateX(6px);
    box-shadow: 0 6px 24px rgba(0, 0, 0, 0.4), 0 0 40px rgba(200, 160, 60, 0.08);
  }
  .nav-card:hover::before { opacity: 1; }

  .nav-icon {
    font-size: 2rem;
    width: 50px;
    height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    border-radius: 10px;
    position: relative;
    z-index: 1;
  }
  .nav-icon.sts  { background: rgba(200,160,60,0.15); }
  .nav-icon.game { background: rgba(80,180,120,0.15);  }
  .nav-icon.home { background: rgba(100,140,200,0.15); }

  .nav-text {
    position: relative;
    z-index: 1;
  }
  .nav-title {
    font-size: 1.1rem;
    letter-spacing: 0.1em;
    margin-bottom: 0.25rem;
  }
  .nav-desc {
    font-size: 0.75rem;
    color: rgba(200, 180, 140, 0.5);
    letter-spacing: 0.05em;
  }

  .nav-arrow {
    margin-left: auto;
    color: rgba(200, 160, 60, 0.3);
    font-size: 1.2rem;
    position: relative;
    z-index: 1;
    transition: all 0.3s;
  }
  .nav-card:hover .nav-arrow {
    color: rgba(200, 160, 60, 0.7);
    transform: translateX(4px);
  }

  .back-link {
    margin-top: 3rem;
    font-size: 0.8rem;
    color: rgba(200, 160, 60, 0.4);
    letter-spacing: 0.08em;
    text-decoration: none;
    transition: color 0.3s;
  }
  .back-link:hover { color: rgba(200, 160, 60, 0.7); }

  @media (max-width: 600px) {
    h1 { font-size: 1.4rem; margin-bottom: 2rem; }
    .nav-card { padding: 1rem 1.2rem; gap: 0.8rem; }
    .nav-icon { font-size: 1.5rem; width: 40px; height: 40px; }
    .nav-title { font-size: 1rem; }
    .nav-desc { font-size: 0.7rem; }
  }
</style>
</head>
<body>

<h1>游 乐 场</h1>

<div class="nav-list">

  <a class="nav-card" href="/tools/sts.html">
    <div class="nav-icon sts">&#x1F0CF;</div>
    <div class="nav-text">
      <div class="nav-title">杀戮尖塔 · 随机卡牌</div>
      <div class="nav-desc">抽取 3 张随机卡牌，支持数字查牌</div>
    </div>
    <span class="nav-arrow">&rarr;</span>
  </a>

  <a class="nav-card" href="/bcb/">
    <div class="nav-icon game">&#x1F3AE;</div>
    <div class="nav-text">
      <div class="nav-title">别抽爆</div>
      <div class="nav-desc">站长自制 Godot 网页小游戏</div>
    </div>
    <span class="nav-arrow">&rarr;</span>
  </a>

  <a class="nav-card" href="/">
    <div class="nav-icon home">&#x1F3E0;</div>
    <div class="nav-text">
      <div class="nav-title">地荒博客</div>
      <div class="nav-desc">返回博客首页</div>
    </div>
    <span class="nav-arrow">&rarr;</span>
  </a>

</div>

<a class="back-link" href="/">&larr; 返回首页</a>

</body>
</html>
